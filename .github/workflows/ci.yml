name: Calculator App CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run application test
        run: npm test

      - name: Check coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage-report
          path: coverage/

      
      - name: Build Docker image
        run: docker build -t calculator-app .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker tag calculator-app ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:latest